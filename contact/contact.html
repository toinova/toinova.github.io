<script>
const translations = {
  ja: {
    title: "お問い合わせ",
    description: `
弊社では建築物の設計をはじめとして・工事監理、家具・照明・その他プロダクトのデザイン、都市計画、ランドスケープデザインなど幅広くお承りいたします。<br>
ご相談は無料です。下記の連絡先までお気軽にお問い合わせください。<br>
ご相談の時点で、敷地や条件などが決まっていなくても構いません。お話を伺った上で、様々なアドバイスをさせて頂きながら、クライアントの方とご一緒にプロジェクトを進めさせていただきたいと思います。<br>
電話　070-9163-2318<br>
メール　contact@toinova.com<br><br>
<strong>ご相談いただいてからの流れと設計料について</strong><br>
<strong>１．初回のご相談</strong><br>
ご相談は無料です。先ずはお気軽にお電話かメールでお問い合わせください。その後、改めてお打ち合わせの日程・場所をご調整の上、直接お会いしてお話をお伺い致します。<br>
ご相談の際にご準備いただくものは特にございません。可能であれば敷地や物件の資料をお持ちください。ご相談の時点で、ご要望やお考えがまとまっていなくても結構です。<br>
土地の選定、改修建物の購入判断、調査等に関しても可能な限り協力させていただきます。お気軽にご相談ください。<br><br>
<strong>２．提案書の作成</strong><br>
ご要望と敷地の資料を元に、法的な条件の整理等を行い、提案書を作成いたします。提案書を元に、ご依頼頂くかどうかをご検討下さい。<br>
提案書の作成には約1か月程度の期間を頂戴しております。提案書の作成まで無料でお承りいたします。<br><br>
<strong>３．設計監理契約</strong><br>
提案書に基づき、建築のアウトラインについてご納得いただけた段階で、設計監理契約を締結させていただきます。<br>
この段階で着手金として設計料の1/3をご請求させていただきます。<br><br>
<strong>４．基本設計</strong><br>
提案書を元に打合せを行いながら、基本設計図、ＣＧ，模型等を作成し、プランの検討、素材の選定・設備・構造の検討を行い、建築の概要を決定してまいります。<br>
期間はプロジェクトの規模に応じて適切な期間を設定させていただきますが、概ね住宅の場合は約3か月程度となります。<br><br>
<strong>５．実施設計</strong><br>
細部の部分まで打ち合わせを行い、詳細な図面を作成します。工事金額の算定根拠となる図面を作成します。<br>
期間はプロジェクトの規模に応じて適切な期間を設定させていただきますが、概ね住宅の場合は約3か月程度となります。<br><br>
<strong>６．見積・確認申請</strong><br>
施工会社を選定し、見積もり依頼をします。見積りを査定し、適正な金額にするための調整を行います。<br>
必要に応じて減額案を作成し、予算との調整を行います。工事金額確定後に確認申請をします。<br>
この段階で中間金として設計料の1/3をご請求させていただきます。<br><br>
<strong>７．本工事・現場監理</strong><br>
工事が着工しましたら、設計図の通りに施工がされているか確認するため、現場監理・検査を行います。<br><br>
<strong>８．竣工検査・引渡し</strong><br>
クライアント立会のもと竣工検査、引渡しを行います。また、竣工1年後にも検査を行います。<br>
竣工時に設計料の残額を請求させていただきます。<br><br>
<strong>設計料について</strong><br>
弊社では、国土交通省による告示「設計、工事監理等に係る業務報酬基準（告示８号）」に基づき、設計料を算定しております。<br>
https://www.mlit.go.jp/jutakukentiku/build/jutakukentiku_house_tk_000082.html<br>
案件ごとに建築物の用途、規模（床面積）、設計内容の難易度などを考慮し、クライアントの皆さまとご相談のうえ、最終的な金額を決定いたします。<br>
具体的な金額につきましては、案件ごとに都度ご相談させていただいておりますので、まずはお気軽にお問い合わせください。<br>
※改修、リノベーションの場合も案件に応じて個別に設計料を算定いたします。通常、新築の場合よりもお安くなる傾向となります。<br>
※工事監理業務を含みます。<br>
※遠方のプロジェクトの場合、交通費を別途ご請求する場合がございます。<br>
※設計料には確認申請書等の作成費を含みますが、申請手数料は別途必要となります。<br>
`

  en: {
    title: "Contact",
    description: `
At Toinova, we offer comprehensive design services that extend beyond architecture—encompassing construction supervision, furniture and lighting design, product development, urban planning, and landscape architecture.<br>
Your initial consultation is completely free, and we welcome inquiries at any stage—even if your site or specific requirements have not yet been finalized.<br>
We look forward to hearing your ideas and collaborating with you to develop a project that is thoughtful, functional, and uniquely yours.<br><br>
Tel　070-9163-2318<br>
Mail　contact@toinova.com<br><br>
<strong>Process After Consultation and Design Fees</strong><br>

<strong>1. Consultation</strong><br>
Consultations are free of charge. Please feel free to contact us first by phone or email. Afterwards, we will coordinate a meeting schedule and location, and have a direct discussion.<br>
No special materials are required for the consultation. If possible, please bring any site or property information. It is perfectly fine if your ideas are not yet fully developed at this stage.<br>
We can also assist with site selection, decisions on purchasing properties for renovation, and preliminary studies to the extent possible. Please do not hesitate to consult us.<br><br>

<strong>2. Proposal</strong><br>
Based on your requests and site information, we will organize legal conditions and prepare a proposal. Please review the proposal to decide whether to proceed with us.<br>
Preparation of the proposal typically takes about one month.<br><br>

<strong>3. Contract</strong><br>
Once you are satisfied with the outline of the architecture based on the proposal, we will enter into a design and supervision contract.<br>
At this stage, we will request one-third of the design fee as an initial payment.<br><br>

<strong>4. Basic Design</strong><br>
Through meetings based on the proposal, we will create basic design drawings, CG renderings, models, etc., and determine the overall plan, select materials, and consider equipment and structure.<br>
The duration will be set appropriately depending on the scale of the project, but for residences it is generally about three months.<br><br>

<strong>5. Detailed Design</strong><br>
We will hold discussions to refine every detail and prepare detailed drawings. These drawings will serve as the basis for calculating the construction cost.<br>
The duration will be set appropriately depending on the scale of the project, but for residences it is generally about three months.<br><br>

<strong>6. Cost Estimation and Permit Application</strong><br>
We will select a contractor and request cost estimates. We will review and negotiate the estimates to ensure an appropriate cost.<br>
If necessary, we will prepare cost-reduction proposals to adjust the budget. Once the construction cost is finalized, we will proceed with the permit application.<br>
At this stage, we will request another one-third of the design fee as an interim payment.<br><br>

<strong>7. Construction and Supervision</strong><br>
Once construction begins, we will carry out site supervision and inspections to ensure the work is executed in accordance with the design drawings.<br><br>

<strong>8. Completion Inspection</strong><br>
With the client present, we will conduct a completion inspection and handover. An additional inspection will be conducted one year after completion.<br>
The remaining balance of the design fee will be requested upon completion.<br><br>

<strong>Design Fees</strong><br>
At our office, design fees are calculated in accordance with the official standard set by the Ministry of Land, Infrastructure, Transport and Tourism (MLIT):<br>
https://www.mlit.go.jp/jutakukentiku/build/jutakukentiku_house_tk_000082.html<br>
For each project, the final fee is determined through consultation with the client, taking into account the building’s use, total floor area, and the complexity of the design.<br>
The specific fee is discussed individually for each project, so please feel free to contact us.<br>
For renovation projects, fees are also calculated individually for each project, and tend to be lower than those for new construction.<br>
Fees include construction supervision.<br>
Additional travel costs may be charged for projects located at a distance.<br>
Fees include the preparation of application documents, but official application charges are not included.<br>
`
  }
};

function setLanguage(lang) {
  localStorage.setItem("lang", lang);
  if (translations[lang]) {
    for (const key in translations[lang]) {
      const el = document.getElementById(key);
      if (el) {
        el.innerHTML = translations[lang][key];
      }
    }
  }
}

window.addEventListener("DOMContentLoaded", () => {
  const lang = localStorage.getItem("lang") || "ja";
  setLanguage(lang);
});
