<script>
  const translations = {
    ja: {
      title: "山形市西部保育所",
    description: `
子どもが生き生きと過ごすことができる保育環境と遊び環境の提供、インクルージブ保育の提供、清潔な衛生環境の確保<br>
このページは準備中です<br>
周辺住宅地のスケールに馴染み、住民からも愛される保育園を実現しました。<br>
<br>
`
  },
  en: {
      title: "Yamagata west nursery",
      description: `
This page is under preparation.<br>
<br>
`
    }
  };
  function setLanguage(lang) {
    localStorage.setItem("lang", lang);
    for (const key in translations[lang]) {
      const el = document.getElementById(key);
      if (el) el.innerHTML = translations[lang][key];
    }
  }
  window.addEventListener("DOMContentLoaded", () => {
    const lang = localStorage.getItem("lang") || "ja";
    setLanguage(lang);
  });
</script>
