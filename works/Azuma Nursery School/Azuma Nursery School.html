<script>
  const translations = {
    ja: {
      title: "あずま保小中一貫校　保育園舎",
    description: `
山間部に位置する小中学校の敷地内に保育園舎を新設し、保小中一貫校へと再編するプロジェクト。<br>
豊かな情操（他者への思いやり、探求心、情緒の安定や想像力など）を育むため、その核として、日常の動線となる「出会いの広場」と自然溢れる「ビオトープ」を、既存校舎と新園舎で囲み込むように配置しました。<br>
これにより、異年齢の交流が特別なイベント時だけでなく、日々の風景の一部としてごく自然に促される空間を意図しています。<br>
人材の流動化が激しい現代社会において、ここで過ごす15年という時間は、子どもたちにとって「人生で最も長く一つの場所に留まる期間」となるかもしれません。<br>
その途方もない時間に相応しい建築のあり方を提示するとともに、ひいては「この町で子育てをしたい」と人々を惹きつけるような地域の原風景となることを目指しています。<br>
`
  },
  en: {
      title: "Azuma Nursery School",
      description: `
A project to restructure an existing elementary and junior high school into an integrated nursery, elementary, and junior high school facility on a site nestled in a mountainous region.<br>
To cultivate a rich emotional foundation—including empathy for others, a spirit of inquiry, emotional stability, and imagination—the existing school buildings and the new nursery facility are arranged to enclose a "Meeting Plaza," which serves as a central hub for daily foot traffic, and a nature-rich biotope at the core of the campus.<br>
This layout intends to naturally foster cross-age interactions as a seamless part of the daily landscape, rather than limiting them to special events.<br>
In today’s highly fluid society, the 15 years children spend in this environment may well become the longest period they remain in a single location throughout their entire lives.<br>
The design aims to present an architectural framework worthy of this profound span of time, while ultimately shaping an archetypal landscape for the community that inspires people to want to raise their children in this town.<br>
`
    }
  };
  function setLanguage(lang) {
    localStorage.setItem("lang", lang);
    for (const key in translations[lang]) {
      const el = document.getElementById(key);
      if (el) el.innerHTML = translations[lang][key];
    }
  }
  window.addEventListener("DOMContentLoaded", () => {
    const lang = localStorage.getItem("lang") || "ja";
    setLanguage(lang);
  });
</script>
