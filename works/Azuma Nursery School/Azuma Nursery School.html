<script>
  const translations = {
    ja: {
      title: "crossing voids",
    description: `
都内のターミナル駅至近に位置する、多世代交流のための公民館プロジェクト。<br>
駅からの人流を迎え入れる都市のゲートとして、ハの字に開いたエキスパンドメタルのファサードを構えました。<br>
内部には、子育て世代から青少年、シニアまでが利用する複合的なプログラムを内包しており、下階から上階へとズレながら連なるボイド（吹き抜け）が、各領域を視覚的かつ立体的に結びつけます。<br>
多様なアクティビティが空間のなかで交差することで、世代を超えた刺激と新たな出会いを創出する建築を目指しました。<br>
`
  },
  en: {
      title: "crossing voids",
      description: `
A community center project designed for multi-generational interaction, located just steps from a major terminal station in Tokyo.<br>
Serving as an urban gateway that welcomes the flow of people from the station, the building features an expanded metal facade that opens outward.<br>
The interior accommodates a diverse range of programs for everyone from young families to youths and seniors, while a series of staggered voids—shifting as they rise from the lower to upper levels—connects these distinct areas both visually and three-dimensionally.<br>
By allowing various activities to intersect within the space, the design aims to inspire cross-generational stimulation and foster new encounters.<br>
`
    }
  };
  function setLanguage(lang) {
    localStorage.setItem("lang", lang);
    for (const key in translations[lang]) {
      const el = document.getElementById(key);
      if (el) el.innerHTML = translations[lang][key];
    }
  }
  window.addEventListener("DOMContentLoaded", () => {
    const lang = localStorage.getItem("lang") || "ja";
    setLanguage(lang);
  });
</script>
