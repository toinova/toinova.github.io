<script>

    en: {
      title: "corporate dormitory for single employees",
       description: `
A company dormitory designed for single employees.<br>
The layout and floor plans were carefully tailored to fit the irregularly shaped site, ensuring the building avoids an imposing presence on the surrounding neighborhood.<br>
Morning sunlight from the east streams into the internal corridors, creating a bright and refreshing space.<br>
The concrete structure is enveloped in perforated metal, resulting in a striking facade.<br>
`
    }
  };
  function setLanguage(lang) {
    localStorage.setItem("lang", lang);
    for (const key in translations[lang]) {
      const el = document.getElementById(key);
      if (el) el.innerHTML = translations[lang][key];
    }
  }
  window.addEventListener("DOMContentLoaded", () => {
    const lang = localStorage.getItem("lang") || "ja";
    setLanguage(lang);
  });
</script>
